<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashAuth Success</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 95vh;
            width: 100vw;
            margin: 0;
            background: #020617; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }

        .window {
            width: 100%;
            height: 100%;
            padding: 2.5rem;
            background: #0b1120; 
            border: 1px solid #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }


        .brand {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 3rem;
        }

        .flash-text {
            font-weight: 900;
            font-style: italic;
            font-size: 1.5rem;
            color: #ff5f03;
        }

        .auth-text {
            font-weight: 900;
            font-style: italic;
            font-size: 1.5rem;
            color: #ff5f03;
        }

        .brand-icon-svg {
            width: 32px;
            height: 32px;
        }

        .circle-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.1);
            border: 2px solid rgba(59, 130, 246, 0.2);
            margin-bottom: 2rem;
            animation: pulse 2s infinite ease-in-out;
        }

        .checkmark { width: 80px; height: 80px; }

        .circle {
            stroke: #3b82f6; 
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 260;
            stroke-dashoffset: 260;
            animation: circle 0.8s forwards ease-in-out;
        }
        
        .check {
            stroke: #3b82f6;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 65;
            stroke-dashoffset: 65;
            animation: check 0.6s forwards ease-in-out 0.5s;
        }

        @keyframes circle { to { stroke-dashoffset: 0; } }
        @keyframes check { to { stroke-dashoffset: 0; } }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0px rgba(59, 130, 246, 0); }
            50% { box-shadow: 0 0 25px rgba(59, 130, 246, 0.3); }
        }

        .bottom-area { 
            text-align: center;
        }

        .bottom-area h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            color: #f8fafc;
        }

        .bottom-area p {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 0.5rem;
        }
        .center{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="window">
        <div class="center">
            <div class="brand">
                <span class="flash-text">FLASH</span>
                <svg class="brand-icon-svg" viewBox="0 0 1024 1024">
                    <path d="M704 469.333333h-200.533333L640 106.666667H405.333333l-128 448h183.466667L362.666667 960z" fill="#f97316" />
                </svg>
                <span class="auth-text">AUTH</span>
            </div>
            
            <div class="circle-btn">
                <svg class="checkmark" viewBox="0 0 100 100">
                    <circle class="circle" cx="50" cy="50" r="40" fill="none"/>
                    <path class="check" fill="none" d="M30 50 L45 65 L70 35"/>
                </svg>
            </div>

            <div class="bottom-area">
                <h2>Success!</h2>
                <p>Authenticated via FlashAuth</p>
            </div>
        </div>
    </div>

<script>
    console.log("Checking Opener...");
    setTimeout(() => {
        try {
            if (window.opener) {
                console.log("Opener found, sending message to: {{clientFrontEndURL}}");
                
                window.opener.postMessage(
                    { type: "FLASHAUTH_TOKEN", token: "{{flashToken}}" },
                    "*" // ALLOW ALL ORIGIN
                );
                
                console.log("Message dispatched.");
            } else {
                console.error("CRITICAL: window.opener is NULL. COOP headers are still blocking the connection.");
            }
        } catch (e) {
            console.error("PostMessage Error:", e);
        }
    }, 500);

    setTimeout(() => { window.close(); }, 15000); 
</script>
</body>
</html>
