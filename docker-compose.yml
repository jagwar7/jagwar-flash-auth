version: '3.8'
services:
  backend:
    image: jagwar7/flash-auth-app:latest
    container_name: express-backend
    restart: always
    ports:
      - "5900:5900"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379
      - GOOGLE_APPLICATION_CREDENTIALS=/app/config/firebase_config.json
    volumes:
      - /home/ubuntu/firebase-auth.json:/app/config/firebase_config.json
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: