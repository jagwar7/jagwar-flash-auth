version: '3.8'

services:
  backend:
    image: jagwar7/flash-auth-app:latest
    container_name: express-backend
    restart: always
    ports:
      - "5900:5900"
    # Load the physical file we created in the Jenkinsfile
    env_file:
      - .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/config/firebase_config.json
    volumes:
      - /home/ubuntu/firebase-auth.json:/app/config/firebase_config.json
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"

volumes:
  redis_data: