  backend:
    build: .
    image: jagwar-flash-app:v1
    container_name: flashauth-container
    restart: always
    ports:
      - "${ENV_SYSTEM_PORT}:${ENV_CONTAINER_PORT}" # INCOMING TRAFFIC ON : SYSTEM_PORT ----FORWARDED---> CONTAINER_PORT 
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - CONTAINER_PORT=${ENV_CONTAINER_PORT}  #  DOCKER CONTAINER PORT <----- ENV_CONTAINER_PORT
      - REDIS_URL=redis://redis-container:6379
      - RABBIT_HOST=${ENV_RABBIT_HOST}
      - RABBIT_USER=${ENV_RABBIT_USER}
      - RABBIT_PASSWORD=${ENV_RABBIT_PASSWORD}
      # - FRONTEND_URL=${ENV_FRONTEND_URL}
      - CONTAINER_PROXY_URL=${ENV_PROXY_URL}
    # volumes:
    #   - ./firebase_config.json:/app/config/firebase_config.json #  HAND OVER FIREBASE CONFIG FROM UBUNTU DIRECTORY TO ----> CONTAINER
    # depends_on:
    #   redis:
    #     condition: service_healthy
    networks:
      - flashauth-network

networks:
  flashauth-network:
    driver: bridge

